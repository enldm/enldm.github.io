<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>战地风云人格测试 - 你是哪一类玩家？</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
            position: relative;
        }

        #bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            opacity: 0.4;
            z-index: -1;
            transition: background-image 0.5s ease;
            pointer-events: none;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            color: #ff9800;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            color: #aaa;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #333;
            border-radius: 5px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff9800, #ff5722);
            transition: width 0.5s ease;
            border-radius: 5px;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .question-text {
            font-size: 1.4em;
            margin-bottom: 25px;
            color: #fff;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid transparent;
            border-radius: 10px;
            padding: 15px 20px;
            color: #e0e0e0;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }

        .option-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #ff9800;
            transform: translateX(5px);
        }

        .option-btn:active {
            transform: scale(0.98);
        }

        .result-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }

        .result-title {
            text-align: center;
            font-size: 2em;
            color: #ff9800;
            margin-bottom: 30px;
        }

        .result-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #ff9800;
        }

        .result-name {
            font-size: 1.5em;
            color: #fff;
            margin-bottom: 10px;
        }

        .result-desc {
            color: #ccc;
            line-height: 1.6;
        }

        .result-percent {
            float: right;
            color: #ff9800;
            font-weight: bold;
        }

        .restart-btn {
            display: block;
            margin: 30px auto 0;
            padding: 15px 40px;
            background: linear-gradient(90deg, #ff9800, #ff5722);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 1.2em;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .restart-btn:hover {
            transform: scale(1.05);
        }

        .ai-comment-btn {
            display: block;
            margin: 20px auto 0;
            padding: 15px 40px;
            background: linear-gradient(90deg, #9c27b0, #673ab7);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 1.2em;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .ai-comment-btn:hover {
            transform: scale(1.05);
        }

        .ai-comment-btn:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }

        .ai-comment-card {
            background: rgba(156, 39, 176, 0.1);
            border-radius: 15px;
            padding: 30px;
            margin-top: 30px;
            border: 2px solid rgba(156, 39, 176, 0.3);
            display: none;
        }

        .ai-comment-title {
            font-size: 1.5em;
            color: #9c27b0;
            margin-bottom: 20px;
            text-align: center;
        }

        .ai-comment-content {
            line-height: 1.8;
            color: #e0e0e0;
        }

        .ai-comment-content h3 {
            color: #9c27b0;
            margin-top: 20px;
            margin-bottom: 10px;
        }

        .ai-comment-content p {
            margin-bottom: 15px;
        }

        .loading-spinner {
            text-align: center;
            padding: 20px;
            color: #9c27b0;
        }

        .turnstile-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .turnstile-hint {
            text-align: center;
            color: #999;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .turnstile-error {
            text-align: center;
            color: #ff6b6b;
            font-size: 1em;
            margin: 10px 0;
            display: none;
        }

        .personality-icon {
            font-size: 2em;
            margin-right: 10px;
        }

        .result-image {
            display: block;
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            margin-top: 15px;
            object-fit: contain;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8em;
            }

            .question-text {
                font-size: 1.2em;
            }
        }
    </style>
</head>

<body>

        const questions = [
            {

        // 更新进度条
        function updateProgress() {
            const progress = ((currentQuestion) / questions.length) * 100;
            document.getElementById('progress').style.width = progress + '%';
        }

        // 显示问题
        function showQuestion() {
            const container = document.getElementById('quiz-container');
            const q = questions[currentQuestion];

            let html = `
                <div class="question-card">
                    <div class="question-text">${currentQuestion + 1}. ${q.question}</div>
                    <div class="options">
            `;

            q.options.forEach((option, index) => {
                html += `<button class="option-btn" onclick="selectOption(${index})">${option.text}</button>`;
            });

            html += `
                    </div>
                </div>
            `;

            container.innerHTML = html;
            updateProgress();
        }

        // 选择答案
        function selectOption(optionIndex) {
            const option = questions[currentQuestion].options[optionIndex];

            // 记录用户的答案
            userAnswers.push({
                question: questions[currentQuestion].question,
                answer: option.text
            });

            // 累加分数
            for (let personality in option.scores) {
                scores[personality] += option.scores[personality];
            }

            currentQuestion++;

            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                showResults();
            }
        }

        // 显示结果
        function showResults() {
            document.getElementById('progress').style.width = '100%';
            document.getElementById('quiz-container').style.display = 'none';

            // 计算总分并排序
            const sorted = Object.entries(scores)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 3);

            // 保存结果供AI使用
            sortedResults = sorted.map(([key, score]) => {
                const percent = sorted.reduce((sum, [, s]) => sum + s, 0) > 0
                    ? Math.round((score / sorted.reduce((sum, [, s]) => sum + s, 0)) * 100)
                    : 0;
                const p = personalities[key];
                return {
                    name: p.name,
                    icon: p.icon,
                    score: score,
                    percentage: percent + '%'
                };
            });

            const totalScore = sorted.reduce((sum, [, score]) => sum + score, 0);

            let html = '';
            sorted.forEach(([key, score], index) => {
                const percent = totalScore > 0 ? Math.round((score / totalScore) * 100) : 0;
                const p = personalities[key];
                html += `
                    <div class="result-item">
                        <div class="result-name">
                            <span class="personality-icon">${p.icon}</span>
                            ${index + 1}. ${p.name}
                            <span class="result-percent">${percent}%</span>
                        </div>
                        <div class="result-desc">${p.desc}</div>
                        <img class="result-image" src="${p.image}" alt="${p.name}" />
                    </div>
                `;
            });

            document.getElementById('result-content').innerHTML = html;
            document.getElementById('result').style.display = 'block';

            // 初始化Turnstile
            initTurnstile();
        }

        // 随机背景图功能
        function setRandomBackground() {
            const backgrounds = [
                'background/backgroud_1.jpg',
                'background/backgroud_2.jpg',
                'background/backgroud_3.jpg'
            ];
            const randomBg = backgrounds[Math.floor(Math.random() * backgrounds.length)];
            document.getElementById('bg-layer').style.backgroundImage = `url('${randomBg}')`;
        }

        // 数组乱序功能
        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // 重新开始
        function restartQuiz() {
            currentQuestion = 0;
            initScores();
            // 清除Turnstile
            if (turnstileWidgetId !== null) {
                turnstile.remove('#turnstile-container');
                turnstileWidgetId = null;
            }
            document.getElementById('ai-comment-card').style.display = 'none';
            document.getElementById('ai-comment-content').innerHTML = '';
            // 重新乱序问题
            const shuffledQuestions = shuffleArray(questions);
            questions.length = 0;
            questions.push(...shuffledQuestions);
            // 设置新的随机背景
            setRandomBackground();
            document.getElementById('quiz-container').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            showQuestion();
        }

        // 初始化Turnstile
        function initTurnstile() {
            // file:// 协议下 Turnstile 无法运行
            if (window.location.protocol === 'file:') {
                console.warn('Turnstile 不支持 file:// 协议，请通过 HTTP 服务器访问');
                return;
            }
            if (typeof turnstile !== 'undefined' && turnstileWidgetId === null) {
                try {
                    turnstileWidgetId = turnstile.render('#turnstile-container', {
                        sitekey: '0x4AAAAAAC9he1XsF5gvDxdQ',
                        theme: 'dark',
                        callback: function(token) {
                            document.getElementById('turnstile-error').style.display = 'none';
                        }
                    });
                } catch (e) {
                    console.error('Turnstile 渲染失败:', e);
                }
            }
        }

        // 检查Turnstile是否可用
        function isTurnstileReady() {
            if (window.location.protocol === 'file:') {
                showTurnstileError('⚠️ 验证码不支持本地文件打开，请通过 HTTP 服务器访问页面');
                return false;
            }
            if (typeof turnstile === 'undefined') {
                showTurnstileError('⚠️ 验证码组件未加载，请刷新页面重试');
                return false;
            }
            try {
                var resp = turnstile.getResponse('#turnstile-container');
                if (!resp) {
                    showTurnstileError('⚠️ 请先完成上方的人机验证再生成锐评');
                    return false;
                }
                return resp;
            } catch (e) {
                showTurnstileError('⚠️ 验证码未就绪，请稍后再试或刷新页面');
                return false;
            }
        }

        // 生成AI评论
        async function generateAiComment() {
            const btn = document.getElementById('aiCommentBtn');
            const commentCard = document.getElementById('ai-comment-card');
            const commentContent = document.getElementById('ai-comment-content');

            const turnstileCheck = isTurnstileReady();
            if (turnstileCheck === false) return;

            const turnstileResponse = turnstileCheck;

            try {
                btn.disabled = true;
                btn.textContent = '🤖 正在生成...';
                commentCard.style.display = 'block';
                commentContent.innerHTML = '<div class="loading-spinner">正在分析你的战地人格...</div>';

                const requestData = {
                    answers: userAnswers,
                    results: sortedResults,
                    turnstileToken: turnstileResponse
                };

                const response = await fetch('https://api.enldm.cyou/api/aicomment', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });

                const data = await response.json();

                if (data.success) {
                    commentContent.innerHTML = formatMarkdown(data.comment);
                } else {
                    commentContent.innerHTML = `<p style="color: #ff6b6b;">❌ ${data.error}</p>`;
                }

            } catch (error) {
                console.error('生成AI评论时出错:', error);
                commentContent.innerHTML = '<p style="color: #ff6b6b;">❌ 生成评论时发生错误，请检查网络连接或稍后再试。</p>';
            } finally {
                btn.disabled = false;
                btn.textContent = '🤖 重新生成AI锐评';
            }
        }

        // 简单的Markdown格式化函数
        function formatMarkdown(text) {
            return text
                .replace(/### (.*)/g, '<h3>$1</h3>')
                .replace(/## (.*)/g, '<h2>$1</h2>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>')
                .replace(/^/, '<p>')
                .replace(/$/, '</p>');
        }

        // 初始化
        initScores();
        // 首次加载时乱序问题并设置背景
        const shuffledQuestions = shuffleArray(questions);
        questions.length = 0;
        questions.push(...shuffledQuestions);
        setRandomBackground();
        showQuestion();
    </script>
</body>

</html>
