<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>战地风云人格测试 - 你是哪一类玩家？</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            color: #ff9800;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            color: #aaa;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #333;
            border-radius: 5px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff9800, #ff5722);
            transition: width 0.5s ease;
            border-radius: 5px;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .question-text {
            font-size: 1.4em;
            margin-bottom: 25px;
            color: #fff;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid transparent;
            border-radius: 10px;
            padding: 15px 20px;
            color: #e0e0e0;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }

        .option-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #ff9800;
            transform: translateX(5px);
        }

        .option-btn:active {
            transform: scale(0.98);
        }

        .result-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }

        .result-title {
            text-align: center;
            font-size: 2em;
            color: #ff9800;
            margin-bottom: 30px;
        }

        .result-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #ff9800;
        }

        .result-name {
            font-size: 1.5em;
            color: #fff;
            margin-bottom: 10px;
        }

        .result-desc {
            color: #ccc;
            line-height: 1.6;
        }

        .result-percent {
            float: right;
            color: #ff9800;
            font-weight: bold;
        }

        .restart-btn {
            display: block;
            margin: 30px auto 0;
            padding: 15px 40px;
            background: linear-gradient(90deg, #ff9800, #ff5722);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 1.2em;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .restart-btn:hover {
            transform: scale(1.05);
        }

        .personality-icon {
            font-size: 2em;
            margin-right: 10px;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8em;
            }

            .question-text {
                font-size: 1.2em;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🎮 战地风云人格测试</h1>
            <p>回答20个问题，找出你在战场上的真实面目</p>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>

        <div id="quiz-container">
            <!-- 问题会动态加载到这里 -->
        </div>

        <div class="result-card" id="result">
            <div class="result-title">🏆 你的战地人格是：</div>
            <div id="result-content"></div>
            <button class="restart-btn" onclick="restartQuiz()">重新测试</button>
        </div>
    </div>

    <script>
        const personalities = {
            vehicle: {
                name: "载具佬",
                icon: "🚀",
                desc: "你从出生那一刻起就不想碰地面。坦克、装甲车、飞机、直升机——只要是能开的，你都要占为己有。当载具被摧毁时，你会感到人生失去了意义。复活点？那是给步兵用的，你只认载具出生点。"
            },
            aa: {
                name: "AA人",
                icon: "🛡️",
                desc: "你的存在意义就是让天空变成禁飞区。当你看到敌机时，眼睛会发光。专职防空，热爱防空导弹车，时刻准备着给那些嚣张的飞行员一个惊喜。天上的鸟最好都别飞过你的头顶。"
            },
            infantry: {
                name: "步站狗",
                icon: "🏃",
                desc: "你是纯粹的地面战士，步枪就是你的灵魂。不需要载具，不需要支援，一双战术靴走天下。擅长突袭点位，占领目标，你是团队中那些真正在玩游戏的人。载具？那是什么，能吃吗？"
            },
            medic: {
                name: "萨尼铁塔",
                icon: "💉",
                desc: "你是团队的守护天使，带着医疗包和除颤器四处奔波。救人性命比杀人更重要，看到倒地的队友就像看到亲人。你的K/D可能很难看，但你不在乎——复活数才是你的真实K/D。"
            },
            camper: {
                name: "架枪逼",
                icon: "🎯",
                desc: "你找到了一个完美的角落，机枪架好，手雷摆在手边，谁来都不好使。一个点位可以守住整个世纪。队友可能会骂你，但敌人更恨你。你不移动，你只等待。"
            },
            toxic: {
                name: "嘴臭哥",
                icon: "😤",
                desc: "你的武器不是枪，是你的嘴。全局聊天活跃分子，擅长从敌方心理层面击溃对手。杀人不如诛心，你的毒液能让全服玩家都记住你的ID。技术一般，但气势不输。"
            },
            commander: {
                name: "指挥官",
                icon: "👑",
                desc: "你是天生的指挥官，全局语音是你的朝堂。虽然没人听你的，但这不影响你指挥全局。擅长部署命令，标记敌人，战术分析。队友可能觉得你烦，但你知道——这是为他们好。"
            },
            suicide: {
                name: "自爆步兵",
                icon: "💥",
                desc: "C4就是你的初恋，吉普车是你的信使。你的生命意义就是和敌人的载具同归于尽。虽然你的K/D是0.1，但每次换掉的坦克都价值连城。你是战场上的恐怖分子，敌人看到吉普车就害怕。"
            },
            sniper: {
                name: "狙击佬",
                icon: "🔭",
                desc: "地图边缘的守望者，一千米外的一击必杀。你可以在同一个位置趴整局，只为那一个完美的射击机会。团队可能输掉比赛，但你的狙击数一定很漂亮。千里之外取敌首级，事了拂衣去。"
            }
        };

        const questions = [
            {
                question: "游戏开始了！你做的第一件事是？",
                options: [
                    { text: "冲刺向载具点，谁也别想跟我抢！", scores: { vehicle: 10 } },
                    { text: "直奔目标点，开始占领", scores: { infantry: 10 } },
                    { text: "带好除颤器，准备救死扶伤", scores: { medic: 10 } },
                    { text: "找个高点趴下，等待猎物", scores: { sniper: 10 } }
                ]
            },
            {
                question: "你发现敌方坦克正在肆虐，你会？",
                options: [
                    { text: "开我的坦克跟它硬刚！", scores: { vehicle: 10 } },
                    { text: "开着C4吉普车跟它同归于尽！", scores: { suicide: 10 } },
                    { text: "切换AA导弹车，教它做人", scores: { aa: 10 } },
                    { text: "呼叫队友一起集火它", scores: { commander: 10 } }
                ]
            },
            {
                question: "队友在语音里大喊'需要医疗！'，你的反应是？",
                options: [
                    { text: "马上到！带着除颤器冲过去！", scores: { medic: 10 } },
                    { text: "菜逼就别出来送人头", scores: { toxic: 10 } },
                    { text: "我在前线激战，你自己爬过来", scores: { infantry: 10 } },
                    { text: "在地图上标记医疗位置，叫别人去", scores: { commander: 10 } }
                ]
            },
            {
                question: "你最喜欢的杀敌方式是？",
                options: [
                    { text: "架好机枪，来一个杀一个", scores: { camper: 10 } },
                    { text: "千米之外一枪爆头", scores: { sniper: 10 } },
                    { text: "用载具主炮轰成渣", scores: { vehicle: 10 } },
                    { text: "步枪对枪，硬碰硬", scores: { infantry: 10 } }
                ]
            },
            {
                question: "比赛输了，你觉得原因是？",
                options: [
                    { text: "队友太菜，我carry不动", scores: { toxic: 10 } },
                    { text: "没人听我指挥", scores: { commander: 10 } },
                    { text: "我救了那么多人，还是输了", scores: { medic: 10 } },
                    { text: "载具刷新太慢了", scores: { vehicle: 10 } }
                ]
            },
            {
                question: "你的K/D比率通常是？",
                options: [
                    { text: "很高，但我输出不多", scores: { sniper: 10 } },
                    { text: "很高，我不轻易送死", scores: { camper: 10 } },
                    { text: "非常低，1换1我都赚", scores: { suicide: 10 } },
                    { text: "很低，我死得比救得人多", scores: { medic: 10 } }
                ]
            },
            {
                question: "你最讨厌的情况是？",
                options: [
                    { text: "敌方飞机一直在头顶", scores: { aa: 10 } },
                    { text: "队友抢我人头", scores: { toxic: 10 } },
                    { text: "有人绕后偷我", scores: { camper: 10 } },
                    { text: "载具被抢了", scores: { vehicle: 10 } }
                ]
            },
            {
                question: "你在游戏中使用最多的装备是？",
                options: [
                    { text: "突击步枪+手雷", scores: { infantry: 10 } },
                    { text: "医疗包+除颤器", scores: { medic: 10 } },
                    { text: "C4+C4+更多C4", scores: { suicide: 10 } },
                    { text: "防空导弹车", scores: { aa: 10 } }
                ]
            },
            {
                question: "你的游戏风格最像哪句话？",
                options: [
                    { text: "钢铁洪流，碾压一切", scores: { vehicle: 10 } },
                    { text: "运筹帷幄之中", scores: { commander: 10 } },
                    { text: "制空权就是一切", scores: { aa: 10 } },
                    { text: "脚踏实地，一步一个脚印", scores: { infantry: 10 } }
                ]
            },
            {
                question: "你看到敌方载具无人看守，你会？",
                options: [
                    { text: "开着它撞墙自爆！", scores: { suicide: 10 } },
                    { text: "用AA导弹打爆它", scores: { aa: 10 } },
                    { text: "标记给队友来开", scores: { commander: 10 } },
                    { text: "开它跟我队友换车", scores: { vehicle: 10 } }
                ]
            },
            {
                question: "你对团队合作的态度是？",
                options: [
                    { text: "我活着，队友就能活着", scores: { medic: 10 } },
                    { text: "我指挥，他们执行", scores: { commander: 10 } },
                    { text: "我会跟着大部队走", scores: { infantry: 10 } },
                    { text: "队友太菜，我不跟他们合作", scores: { toxic: 10 } }
                ]
            },
            {
                question: "为什么你喜欢玩战地？",
                options: [
                    { text: "狙击爆头的快感", scores: { sniper: 10 } },
                    { text: "开坦克/飞机太爽了", scores: { vehicle: 10 } },
                    { text: "打飞机很有成就感", scores: { aa: 10 } },
                    { text: "C4爆炸的瞬间最美", scores: { suicide: 10 } }
                ]
            },
            {
                question: "敌方飞机出现时，你的反应是？",
                options: [
                    { text: "开着AA车追着它打", scores: { aa: 10 } },
                    { text: "太远了，不管它", scores: { sniper: 10 } },
                    { text: "找掩护，继续地面战斗", scores: { infantry: 10 } },
                    { text: "全局语音：'这飞得真菜'", scores: { toxic: 10 } }
                ]
            },
            {
                question: "你的队友在占领点位，你在做什么？",
                options: [
                    { text: "在周围架枪，保护他们", scores: { camper: 10 } },
                    { text: "我也进去帮忙占领", scores: { infantry: 10 } },
                    { text: "在地图上标记该点位", scores: { commander: 10 } },
                    { text: "开着坦克在周围巡逻", scores: { vehicle: 10 } }
                ]
            },
            {
                question: "你最有成就感的一次击杀是？",
                options: [
                    { text: "开着满载C4的吉普车炸掉敌方坦克", scores: { suicide: 10 } },
                    { text: "千米之外狙击爆头", scores: { sniper: 10 } },
                    { text: "用载具主炮一炮双杀", scores: { vehicle: 10 } },
                    { text: "复活了五个队友然后反败为胜", scores: { medic: 10 } }
                ]
            },
            {
                question: "选择复活点时，你会选？",
                options: [
                    { text: "必须选载具出生点！", scores: { vehicle: 10 } },
                    { text: "离战斗最近的地方", scores: { infantry: 10 } },
                    { text: "找个安全点慢慢去", scores: { camper: 10 } },
                    { text: "AA车旁边", scores: { aa: 10 } }
                ]
            },
            {
                question: "队友抢了你要开的载具，你会？",
                options: [
                    { text: "语音喷他一顿", scores: { toxic: 10 } },
                    { text: "算了，当步兵吧", scores: { infantry: 10 } },
                    { text: "在地图上标记'载具'", scores: { commander: 10 } },
                    { text: "等下一辆载具刷新", scores: { vehicle: 10 } }
                ]
            },
            {
                question: "在大地图作战时，你更喜欢？",
                options: [
                    { text: "找个狙击位，慢慢瞄准", scores: { sniper: 10 } },
                    { text: "开飞机/坦克到处跑", scores: { vehicle: 10 } },
                    { text: "开着AA车防空", scores: { aa: 10 } },
                    { text: "在地图上标记敌人位置", scores: { commander: 10 } }
                ]
            },
            {
                question: "你觉得自己在战场上的角色是？",
                options: [
                    { text: "前线突击手", scores: { infantry: 10 } },
                    { text: "后方守护者", scores: { camper: 10 } },
                    { text: "载具驾驶员", scores: { vehicle: 10 } },
                    { text: "支援兵", scores: { medic: 10 } }
                ]
            },
            {
                question: "遇到敌方狙击手，你会？",
                options: [
                    { text: "找个掩体跟他狙击对枪", scores: { sniper: 10 } },
                    { text: "绕后近身把他刀了", scores: { infantry: 10 } },
                    { text: "标记位置叫队友来", scores: { commander: 10 } },
                    { text: "开着坦克直接压过去", scores: { vehicle: 10 } }
                ]
            },
            {
                question: "最后，你最喜欢战地的哪一点？",
                options: [
                    { text: "大场面的载具战", scores: { vehicle: 10 } },
                    { text: "跟队友一起冲锋", scores: { infantry: 10 } },
                    { text: "指挥千军万马的感觉", scores: { commander: 10 } },
                    { text: "一夫当关，万夫莫开", scores: { camper: 10 } }
                ]
            }
        ];

        let currentQuestion = 0;
        let scores = {};

        // 初始化分数
        function initScores() {
            scores = {
                vehicle: 0,
                aa: 0,
                infantry: 0,
                medic: 0,
                camper: 0,
                toxic: 0,
                commander: 0,
                suicide: 0,
                sniper: 0
            };
        }

        // 更新进度条
        function updateProgress() {
            const progress = ((currentQuestion) / questions.length) * 100;
            document.getElementById('progress').style.width = progress + '%';
        }

        // 显示问题
        function showQuestion() {
            const container = document.getElementById('quiz-container');
            const q = questions[currentQuestion];

            let html = `
                <div class="question-card">
                    <div class="question-text">${currentQuestion + 1}. ${q.question}</div>
                    <div class="options">
            `;

            q.options.forEach((option, index) => {
                html += `<button class="option-btn" onclick="selectOption(${index})">${option.text}</button>`;
            });

            html += `
                    </div>
                </div>
            `;

            container.innerHTML = html;
            updateProgress();
        }

        // 选择答案
        function selectOption(optionIndex) {
            const option = questions[currentQuestion].options[optionIndex];

            // 累加分数
            for (let personality in option.scores) {
                scores[personality] += option.scores[personality];
            }

            currentQuestion++;

            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                showResults();
            }
        }

        // 显示结果
        function showResults() {
            document.getElementById('progress').style.width = '100%';
            document.getElementById('quiz-container').style.display = 'none';

            // 计算总分并排序
            const sorted = Object.entries(scores)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 3);

            const totalScore = sorted.reduce((sum, [, score]) => sum + score, 0);

            let html = '';
            sorted.forEach(([key, score], index) => {
                const percent = totalScore > 0 ? Math.round((score / totalScore) * 100) : 0;
                const p = personalities[key];
                html += `
                    <div class="result-item">
                        <div class="result-name">
                            <span class="personality-icon">${p.icon}</span>
                            ${index + 1}. ${p.name}
                            <span class="result-percent">${percent}%</span>
                        </div>
                        <div class="result-desc">${p.desc}</div>
                    </div>
                `;
            });

            document.getElementById('result-content').innerHTML = html;
            document.getElementById('result').style.display = 'block';
        }

        // 重新开始
        function restartQuiz() {
            currentQuestion = 0;
            initScores();
            document.getElementById('quiz-container').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            showQuestion();
        }

        // 初始化
        initScores();
        showQuestion();
    </script>
</body>

</html>
