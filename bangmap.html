    <script>
        (function () {
            const scriptSrc = 'echarts.min.js';
            let loaded = false;

            function loadScript(src) {
                return new Promise((resolve, reject) => {
                    if (loaded) return;

                    const script = document.createElement('script');
                    script.src = src;
                    script.async = false;  // 同步加载，确保顺序

                    script.onload = () => {
                        if (!loaded) {
                            loaded = true;
                            console.log('ECharts loaded from:', src);
                            resolve();
                        }
                    };

                    script.onerror = () => {
                        console.error('Failed to load ECharts from:', src);
                        reject();
                    };

                    document.head.appendChild(script);
                });
            }

            loadScript(scriptSrc).then(() => {
                console.log('Dispatching echarts-ready event');
                document.dispatchEvent(new Event('echarts-ready'));
            }).catch(() => {
                console.error('ECharts loading failed');
            });
        })();
    </script>

    <script>
        // 马卡龙配色方案 - 柔和的颜色
        const macaronColors = [
            '#FFB7B2', // 柔和粉
            '#B5EAD7', // 薄荷绿
            '#C7CEEA', // 薰衣草紫
            '#FFDAC1', // 杏色
            '#E2F0CB', // 淡绿

            '#F0E68C', // 卡其色
            '#DDA0DD', // 梅红
            '#87CEEB', // 天蓝
            '#F5DEB3', // 小麦色
            '#FFB6C1', // 浅粉红
            '#98FB98', // 苍绿
            '#DDA0DD', // 梅红
            '#FFDAB9', // 桃色
            '#ADD8E6', // 淡蓝
            '#F0FFF0', // 蜜瓜色
            '#FFE4E1', // 薄雾玫瑰
            '#E6E6FA', // 淡紫
            '#FFF0F5', // 淡紫红
            '#F0FFFF', // 淡青
            '#FFFACD', // 柠檬绸色
            '#FFE4B5', // 鹿皮色
            '#E0FFFF', // 淡青
            '#FFFAF0', // 花卉白
            '#F5FFFA', // 薄荷奶油
            '#FFFFE0', // 淡黄
            '#FFF8DC', // 玉米丝色
            '#FFEFD5', // 木瓜色
            '#FFF5EE', // 海贝壳色
            '#FDF5E6'  // 老蕾丝色
        ];

        // 省份相邻关系（用于确保相邻省份颜色不同）
        const provinceAdjacency = {
            '黑龙江': ['吉林', '内蒙古'],
            '吉林': ['黑龙江', '辽宁', '内蒙古'],
            '辽宁': ['吉林', '河北', '内蒙古'],
            '内蒙古': ['黑龙江', '吉林', '辽宁', '河北', '山西', '陕西', '宁夏', '甘肃'],
            '河北': ['辽宁', '内蒙古', '山西', '北京', '天津', '山东', '河南'],
            '北京': ['河北', '天津'],
            '天津': ['河北', '北京', '山东'],
            '山西': ['内蒙古', '河北', '陕西', '河南'],
            '山东': ['河北', '天津', '河南', '安徽', '江苏'],
            '河南': ['河北', '山西', '陕西', '湖北', '安徽', '山东', '江苏'],
            '陕西': ['内蒙古', '山西', '河南', '湖北', '重庆', '四川', '甘肃', '宁夏'],
            '甘肃': ['内蒙古', '宁夏', '陕西', '四川', '青海', '新疆'],
            '宁夏': ['内蒙古', '甘肃', '陕西'],
            '青海': ['甘肃', '新疆', '四川', '西藏'],
            '新疆': ['甘肃', '青海', '西藏'],
            '西藏': ['新疆', '青海', '四川', '云南'],
            '四川': ['陕西', '甘肃', '青海', '西藏', '云南', '贵州', '重庆', '湖北', '河南'],
            '重庆': ['陕西', '四川', '湖北', '湖南', '贵州'],
            '云南': ['西藏', '四川', '贵州', '广西'],
            '贵州': ['四川', '重庆', '云南', '广西', '湖南', '湖北'],
            '湖北': ['河南', '陕西', '重庆', '湖南', '江西', '安徽', '重庆'],
            '湖南': ['湖北', '重庆', '贵州', '广西', '广东', '江西'],
            '广西': ['湖南', '贵州', '云南', '广东'],
            '广东': ['福建', '江西', '湖南', '广西', '海南', '香港', '澳门'],
            '海南': ['广东'],
            '福建': ['浙江', '江西', '广东', '台湾'],
            '浙江': ['上海', '江苏', '安徽', '江西', '福建'],
            '江苏': ['山东', '安徽', '上海', '浙江'],
            '上海': ['江苏', '浙江'],
            '安徽': ['山东', '河南', '湖北', '江西', '浙江', '江苏'],
            '江西': ['安徽', '湖北', '湖南', '广东', '福建', '浙江'],
            '台湾': ['福建'],
            '香港': ['广东', '澳门', '台湾'],
            '澳门': ['广东', '香港']
        };

        // 为省份分配颜色（确保相邻省份颜色不同）
        function assignProvinceColors() {
            const colors = {};
            const provinces = Object.keys(provinceAdjacency);

            for (const province of provinces) {
                const usedColors = new Set();
                // 获取已分配颜色的相邻省份
                const neighbors = provinceAdjacency[province] || [];
                neighbors.forEach(neighbor => {
                    if (colors[neighbor]) {
                        usedColors.add(colors[neighbor]);
                    }
                });

                // 找到第一个未被使用的颜色
                for (const color of macaronColors) {
                    if (!usedColors.has(color)) {
                        colors[province] = color;
                        break;
                    }
                }

                // 如果所有颜色都被使用，随机选择一个
                if (!colors[province]) {
                    colors[province] = macaronColors[Math.floor(Math.random() * macaronColors.length)];
                }
            }

            // 为未定义的省份分配随机颜色
            // 使用省份名称的哈希值来确保一致性
            const allProvinceNames = [
                '黑龙江', '吉林', '辽宁', '内蒙古', '河北', '北京', '天津', '山西',
                '山东', '河南', '陕西', '甘肃', '宁夏', '青海', '新疆',
                '西藏', '四川', '重庆', '云南', '贵州', '湖北', '湖南', '广西',
                '广东', '海南', '福建', '浙江', '江苏', '上海', '安徽', '江西', '台湾',
                '香港', '澳门'
            ];

            allProvinceNames.forEach(province => {
                if (!colors[province]) {
                    let hash = 0;
                    for (let i = 0; i < province.length; i++) {
                        hash = province.charCodeAt(i) + ((hash << 5) - hash);
                    }
                    colors[province] = macaronColors[Math.abs(hash) % macaronColors.length];
                }
            });

            return colors;
        }

        const provinceColors = assignProvinceColors();

        // 为 ECharts 创建数据数组
        function createMapData() {
            const data = [];
            for (const province in provinceColors) {
                data.push({
                    name: province,
                    itemStyle: {
                        areaColor: provinceColors[province]
                    }
                });
            }
            return data;
        }

        // 调试：页面加载日志
        console.log('Page loaded, waiting for ECharts...');

        // 等待 ECharts 加载完成后再初始化地图
        document.addEventListener('echarts-ready', function () {
            console.log('echarts-ready event fired!');
            initMap();
        });

        // 备用机制：如果 3 秒后还没触发 echarts-ready，强制初始化
        setTimeout(function () {
            if (typeof echarts !== 'undefined') {
                console.log('ECharts available, forcing initialization...');
                initMap();
            } else {
                console.error('ECharts not loaded after 3 seconds!');
            }
        }, 3000);

        function initMap() {
            console.log('initMap() called');
            // 初始化ECharts
            const myChart = echarts.init(document.getElementById('map'));

            // 获取当前页面的基础路径，支持 GitHub Pages 子路径部署
            const baseURL = window.location.origin + window.location.pathname.replace(/\/[^/]*$/, '/');

            console.log('Loading mapdata from:', baseURL + 'mapdata.json');

            // 加载中国地图数据和省份城市数据
            Promise.all([
                fetch(baseURL + 'mapdata.json').then(response => {
                    console.log('mapdata.json response status:', response.status);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                }).catch(error => {
                    console.error('Failed to load mapdata.json:', error);
                    throw error;
                }),
                // 修改为调用 API 接口
                fetch('https://mapapi.enldm.cyou/api/bandori').then(response => {
                    console.log('API response status:', response.status);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                }).catch(error => {
                    console.error('Failed to load API data:', error);
                    throw error;
                })
            ]).then(([mapData, apiResponse]) => {
                // 将 API 返回的数据转换为原来的格式
                const provinceCities = {};

                if (apiResponse.success && apiResponse.data) {
                    apiResponse.data.forEach(item => {
                        // 只展示已认证的数据
                        if (item.verified !== 1) {
                            return;
                        }

                        const province = item.province;
                        if (!provinceCities[province]) {
                            provinceCities[province] = {
                                region: [],
                                school: [],
                                other: []
                            };
                        }

                        // 构建显示文本
                        let displayText = item.name;

                        // 添加群号信息
                        if (item.info) {
                            displayText += ` - ${item.info}`;
                        }

                        // 按类型分类存储
                        if (item.type === 'region') {
                            provinceCities[province].region.push(displayText);
                        } else if (item.type === 'school') {
                            provinceCities[province].school.push(displayText);
                        } else {
                            provinceCities[province].other.push(displayText);
                        }
                    });
                }
                // 注册中国地图
                echarts.registerMap('china', mapData);

                // 配置地图选项
                const option = {
                    tooltip: {
                        trigger: 'item',
                        formatter: function (params) {
                            return params.name;
                        },
                        backgroundColor: 'rgba(255, 255, 255, 0.9)',
                        borderColor: '#DB0054',
                        borderWidth: 2,
                        textStyle: {
                            color: '#DB0054',
                            fontSize: 14
                        }
                    },
                    visualMap: {
                        show: false
                    },
                    series: [
                        {
                            name: '省份',
                            type: 'map',
                            map: 'china',
                            roam: true,
                            zoom: 1.6,
                            center: [105, 36],
                            data: createMapData(),
                            label: {
                                show: true,
                                fontSize: 14,
                                color: '#333',
                                fontWeight: 'bold',
                                formatter: function (params) {
                                    let name = params.name;
                                    name = name
                                        .replace(/特别行政区$/, '')
                                        .replace(/壮族自治区$/, '')
                                        .replace(/维吾尔自治区$/, '')
                                        .replace(/回族自治区$/, '')
                                        .replace(/自治区$/, '')
                                        .replace(/省$/, '');
                                    return name;
                                }
                            },
                            itemStyle: {
                                borderColor: '#ffffff',
                                borderWidth: 2,
                                opacity: 0.9
                            },
                            emphasis: {
                                itemStyle: {
                                    areaColor: '#DB0054',
                                    shadowBlur: 20,
                                    shadowColor: 'rgba(219, 0, 84, 0.5)',
                                    opacity: 1
                                },
                                label: {
                                    show: true,
                                    color: '#fff',
                                    fontSize: 13,
                                    fontWeight: 'bold'
                                }
                            }
                        }
                    ]
                };

                // 设置配置项
                myChart.setOption(option);

                // 动态定位海外按钮
                const mapContainer = document.getElementById('map');
                const overseasBtnWrapper = document.getElementById('overseasBtnWrapper');

                function positionOverseasButton() {
                    const mapRect = mapContainer.getBoundingClientRect();
                    overseasBtnWrapper.style.top = (mapRect.top + 40) + 'px';
                    overseasBtnWrapper.style.left = (mapRect.left + 20) + 'px';
                }

                // 初始定位
                positionOverseasButton();
                // 窗口大小改变时重新定位
                window.addEventListener('resize', positionOverseasButton);

                // 用于防止移动端点击穿透的标志
                let modalJustOpened = false;
                let modalOpenTimer = null;

                // 打开模态框
                function openModal(title, citiesList) {
                    const modal = document.getElementById('glassModal');
                    const overlay = document.getElementById('modalOverlay');
                    const titleEl = document.getElementById('modalTitle');
                    const container = document.getElementById('groupsContainer');

                    titleEl.textContent = title;
                    container.innerHTML = '';

                    // 设置标志，防止点击穿透
                    modalJustOpened = true;
                    if (modalOpenTimer) clearTimeout(modalOpenTimer);
                    modalOpenTimer = setTimeout(() => {
                        modalJustOpened = false;
                    }, 300);

                    // 处理新的数据结构（带分类）
                    if (citiesList.region && citiesList.region.length > 0) {
                        // 添加地区大群标题
                        const regionTitle = document.createElement('div');
                        regionTitle.style.cssText = 'width: 100%; color: #DB0054; font-size: 18px; font-weight: bold; margin: 10px 0; padding-bottom: 5px; border-bottom: 2px solid rgba(219, 0, 84, 0.2);';
                        regionTitle.textContent = '📍 地区大群';
                        container.appendChild(regionTitle);

                        citiesList.region.forEach(city => {
                            const tag = createTag(city);
                            container.appendChild(tag);
                        });
                    }

                    // 添加分界线（如果有学校数据）
                    if (citiesList.school && citiesList.school.length > 0 &&
                        citiesList.region && citiesList.region.length > 0) {
                        const divider = document.createElement('div');
                        divider.style.cssText = 'width: 100%; height: 2px; background: linear-gradient(to right, transparent, rgba(219, 0, 84, 0.3), transparent); margin: 20px 0;';
                        container.appendChild(divider);
                    }

                    if (citiesList.school && citiesList.school.length > 0) {
                        // 添加学校标题
                        const schoolTitle = document.createElement('div');
                        schoolTitle.style.cssText = 'width: 100%; color: #DB0054; font-size: 18px; font-weight: bold; margin: 10px 0; padding-bottom: 5px; border-bottom: 2px solid rgba(219, 0, 84, 0.2);';
                        schoolTitle.textContent = '🏫 学校';
                        container.appendChild(schoolTitle);

                        citiesList.school.forEach(city => {
                            const tag = createTag(city);
                            container.appendChild(tag);
                        });
                    }

                    // 其他类型
                    if (citiesList.other && citiesList.other.length > 0) {
                        if ((citiesList.region && citiesList.region.length > 0) ||
                            (citiesList.school && citiesList.school.length > 0)) {
                            const divider = document.createElement('div');
                            divider.style.cssText = 'width: 100%; height: 2px; background: linear-gradient(to right, transparent, rgba(219, 0, 84, 0.3), transparent); margin: 20px 0;';
                            container.appendChild(divider);
                        }

                        citiesList.other.forEach(city => {
                            const tag = createTag(city);
                            container.appendChild(tag);
                        });
                    }

                    // 如果没有任何数据
                    if ((!citiesList.region || citiesList.region.length === 0) &&
                        (!citiesList.school || citiesList.school.length === 0) &&
                        (!citiesList.other || citiesList.other.length === 0)) {
                        container.innerHTML = '<div class="group-tag empty">暂无数据</div>';
                    }

                    modal.classList.add('active');
                    overlay.classList.add('active');
                }

                // 创建标签的辅助函数
                function createTag(city) {
                    const tag = document.createElement('div');
                    tag.className = 'group-tag';

                    // 检查是否包含数字
                    const numberMatch = city.match(/\d+/g);
                    const hasNumber = numberMatch && numberMatch.length > 0;

                    console.log('createTag:', city, 'hasNumber:', hasNumber);

                    if (hasNumber) {
                        tag.textContent = city;
                        tag.style.pointerEvents = 'auto';  // 确保可以点击

                        // 使用 addEventListener，检查外部的 modalJustOpened 变量
                        tag.addEventListener('click', function (e) {
                            console.log('Tag clicked:', city, 'modalJustOpened:', modalJustOpened);
                            e.preventDefault();
                            e.stopPropagation();
                            // 防止模态框刚打开时触发复制
                            if (modalJustOpened) {
                                console.log('Copy blocked: modal just opened');
                                return;
                            }
                            console.log('Calling copyToClipboard...');
                            copyToClipboard(city, tag);
                        });

                        console.log('addEventListener attached to:', city);
                    } else {
                        tag.textContent = city;
                        tag.classList.add('empty');
                    }

                    return tag;
                }

                // 关闭模态框
                function closeModal() {
                    const modal = document.getElementById('glassModal');
                    const overlay = document.getElementById('modalOverlay');
                    modal.classList.remove('active');
                    overlay.classList.remove('active');
                }

                // 复制到剪贴板
                function copyToClipboard(text, element) {
                    // 提取数字
                    const numbers = text.match(/\d+/g);
                    if (numbers && numbers.length > 0) {
                        const numberToCopy = numbers[numbers.length - 1]; // 复制最后一个数字

                        navigator.clipboard.writeText(numberToCopy).then(() => {
                            // 显示复制成功状态
                            element.classList.add('copied');
                            element.textContent = '已复制！';

                            // 显示提示
                            const toast = document.getElementById('copyToast');
                            toast.classList.add('show');

                            setTimeout(() => {
                                element.classList.remove('copied');
                                element.textContent = text;
                                toast.classList.remove('show');
                            }, 1500);
                        }).catch(err => {
                            console.error('复制失败:', err);
                            alert('复制失败，请手动复制');
                        });
                    }
                }

                // 将函数暴露到全局作用域
                window.closeModal = closeModal;

                // 为海外按钮添加点击事件
                const overseasBtn = document.getElementById('overseasBtn');
                if (overseasBtn) {
                    overseasBtn.addEventListener('click', function (e) {
                        e.stopPropagation();
                        const overseasData = provinceCities['海外'] || { region: [], school: [], other: [] };
                        if (!overseasData.region && !overseasData.school && !overseasData.other) {
                            overseasData = { region: ['暂无海外数据'], school: [], other: [] };
                        }
                        openModal('🌍 海外', overseasData);
                    });
                }

                // 添加地图省份点击事件
                myChart.on('click', function (params) {
                    // 省份点击事件
                    const provinceName = params.name;
                    const cities = provinceCities[provinceName] || { region: [], school: [], other: [] };
                    if (!cities.region && !cities.school && !cities.other) {
                        cities = { region: ['暂无该省数据'], school: [], other: [] };
                    }
                    openModal(`📍 ${provinceName}`, cities);
                });

                // 处理窗口大小变化
                window.addEventListener('resize', function () {
                    myChart.resize();
                });
            }); // end of .then()
        } // end of initMap()

        // 在线投稿
        async function submitMessage() {
            const franchiseSelect = document.getElementById('franchiseSelect').value.trim();
            const submissionType = document.getElementById('submissionType').value.trim();
            const locationName = document.getElementById('locationName').value.trim();
            const groupNumber = document.getElementById('groupNumber').value.trim();
            const turnstileToken = window.turnstile?.getResponse();

            if (!franchiseSelect) {
                alert('请选择音企');
                return;
            }

            if (!submissionType) {
                alert('请选择投稿类型');
                return;
            }

            if (!locationName) {
                alert('请输入完整学校/城市名称');
                return;
            }

            if (!groupNumber) {
                alert('请输入正确的群号');
                return;
            }

            if (!turnstileToken) {
                alert('请完成人机验证');
                return;
            }

            const message = `【${franchiseSelect}】${submissionType} - ${locationName} - ${groupNumber}`;

            const url = 'https://tgapi.enldm.cyou/';

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message,
                        'cf-turnstile-response': turnstileToken
                    })
                });

                const data = await res.json();

                if (data.success) {
                    alert('✅ 投稿已发送！感谢您的贡献！');
                    document.getElementById('franchiseSelect').value = 'BanG Dream';
                    document.getElementById('submissionType').value = '';
                    document.getElementById('locationName').value = '';
                    document.getElementById('groupNumber').value = '';
                    window.turnstile.reset();
                } else {
                    alert('❌ 发送失败：' + (data.error || '未知错误'));
                }
            } catch (err) {
                alert('网络错误，请稍后重试');
                console.error(err);
            }
        }

        // ESC键关闭模态框
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
